name: CI Pipeline - Compilacao e Testes Java

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Preparar diretorios
      run: |
        mkdir -p bin
        mkdir -p lib

    - name: Compilar o projeto
      run: javac -encoding windows-1251 -d bin -cp "lib/*" $(find src -name "*.java")

    - name: Baixar JUnit 4
      run: |
        curl -L https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar -o lib/junit.jar
        curl -L https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar -o lib/hamcrest.jar

    - name: Compilar os testes
      run: javac -encoding UTF-8 -d bin -cp "bin:lib/junit.jar" $(find test -name "*.java")

    - name: Executar os testes
      run: java -cp "bin:lib/junit.jar:lib/hamcrest.jar" org.junit.runner.JUnitCore model.PersonTest model.DatabaseTest controller.ControllerIntegrationTest

    - name: Verificar sucesso
      run: echo "Build e testes concluidos com sucesso!"
