name: CI Pipeline - Compilacao Java

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Preparar diretorios
      run: |
        mkdir -p bin
        mkdir -p lib

    - name: Compilar o projeto
      run: javac -encoding windows-1251 -d bin -cp "lib/*" $(find src -name "*.java")
      
    - name: Verificar sucesso
      run: echo "Compilação concluída com sucesso!"
